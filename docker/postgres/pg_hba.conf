# PostgreSQL Client Authentication Configuration File
# ===================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     trust

# IPv4 local connections:
host    all             all             127.0.0.1/32            trust

# IPv6 local connections:
host    all             all             ::1/128                 trust

# Docker network connections (allow all Docker IPs) - TRUST for development
host    all             all             172.16.0.0/12           trust
host    all             all             192.168.0.0/16          trust

# Allow connections from host machine - TRUST for development
host    all             all             0.0.0.0/0               trust

# Replication connections
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
host    replication     all             172.16.0.0/12           md5
host    replication     all             192.168.0.0/16          md5
