# Redis Configuration for Quiz Game (Production)

# Basic Settings
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Memory Management
maxmemory 1gb
maxmemory-policy allkeys-lru

# Persistence (Production - более консервативные настройки)
save 3600 1
save 300 100
save 60 10000

# RDB Settings
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF Settings
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile /data/redis.log
syslog-enabled yes
syslog-ident redis

# Security (Production)
requirepass ${REDIS_PASSWORD:-prod_redis_password}
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_b835c8b7e5d5e9a7"
rename-command DEBUG ""

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client Settings
maxclients 10000

# Advanced Settings
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog
hll-sparse-max-bytes 3000

# Streams
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active Rehashing
activerehashing yes

# Client Output Buffer Limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client Query Buffer
client-query-buffer-limit 1gb

# Protocol Buffer
proto-max-bulk-len 512mb

# Frequency of rehashing
hz 10

# AOF Rewrite
aof-rewrite-incremental-fsync yes

# RDB-AOF Hybrid Persistence
aof-use-rdb-preamble yes

# TLS Settings (если используется)
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
