name: 🚀 CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Сборка Docker образов
  build-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏷️ Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./quiz-game-backend
          file: ./quiz-game-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./quiz-game-frontend
          file: ./quiz-game-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Деплой в Staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup staging environment
        run: |
          echo "Setting up staging deployment..."
          # Здесь будет конфигурация для staging сервера

      - name: 🚀 Deploy to staging
        run: |
          echo "Deploying to staging..."
          echo "Backend image: ${{ needs.build-images.outputs.backend-image }}"
          echo "Frontend image: ${{ needs.build-images.outputs.frontend-image }}"
          # Здесь будет реальный деплой

      - name: 🔍 Health check
        run: |
          echo "Performing health check..."
          # curl https://staging.quiz-game.com/api/health

      - name: 📢 Notify deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              environment_url: 'https://staging.quiz-game.com',
              description: 'Deployment successful'
            });

  # Smoke тесты после деплоя
  smoke-tests:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always() && needs.deploy-staging.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🧪 Run smoke tests
        run: |
          cd tests
          npm install
          npm run test:smoke
        env:
          BASE_URL: https://staging.quiz-game.com

      - name: 📊 Upload smoke test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: smoke-test-results
          path: tests/smoke-test-results/

  # Деплой в Production (только по approval)
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, smoke-tests]
    environment: production
    if: github.ref == 'refs/heads/main' && github.event.inputs.environment == 'production'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup production environment
        run: |
          echo "Setting up production deployment..."
          # Конфигурация для production

      - name: 🚀 Deploy to production
        run: |
          echo "Deploying to production..."
          echo "Backend image: ${{ needs.build-images.outputs.backend-image }}"
          echo "Frontend image: ${{ needs.build-images.outputs.frontend-image }}"
          # Реальный production деплой

      - name: 🔍 Production health check
        run: |
          echo "Performing production health check..."
          # curl https://quiz-game.com/api/health

      - name: 📢 Notify production deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              environment_url: 'https://quiz-game.com',
              description: 'Production deployment successful'
            });

  # Rollback механизм
  rollback:
    name: ↩️ Rollback
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [deploy-staging, deploy-production]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ↩️ Rollback deployment
        run: |
          echo "Rolling back deployment..."
          # Логика отката

      - name: 📢 Notify rollback
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deployment Rollback Required',
              body: 'Deployment failed and rollback was initiated. Please investigate.',
              labels: ['bug', 'deployment', 'urgent']
            });
