name: 🔄 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io

jobs:
  # Проверка кода и тестирование
  lint-and-test:
    name: 🧹 Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        workspace: [quiz-game-backend, quiz-game-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm run install:all

      - name: 🧹 Run ESLint
        run: |
          cd ${{ matrix.workspace }}
          npm run lint:check

      - name: 💅 Check Prettier formatting
        run: |
          cd ${{ matrix.workspace }}
          npm run format:check

      - name: 🔍 TypeScript type check
        run: |
          cd ${{ matrix.workspace }}
          npm run type-check

      - name: 🧪 Run tests
        run: |
          cd ${{ matrix.workspace }}
          npm run test
        env:
          NODE_ENV: test

  # Сборка проекта
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm run install:all

      - name: 🏗️ Build backend
        run: |
          cd quiz-game-backend
          npm run build

      - name: 🏗️ Build frontend
        run: |
          cd quiz-game-frontend
          npm run build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            quiz-game-backend/dist/
            quiz-game-frontend/dist/
          retention-days: 7

  # E2E тестирование
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: quiz_game_test
          POSTGRES_USER: quiz_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm run install:all

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: 🎭 Install Playwright
        run: |
          cd tests
          npm run test:install

      - name: 🚀 Start application
        run: |
          npm run start &
          sleep 30
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: quiz_game_test
          DB_USER: quiz_user
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: 🧪 Run E2E tests
        run: |
          cd tests
          npm run test
        env:
          CI: true

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

  # Проверка безопасности
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm run install:all

      - name: 🔍 Run security audit
        run: npm run security:audit

      - name: 🛡️ Run CodeQL analysis
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: 🔍 Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2
