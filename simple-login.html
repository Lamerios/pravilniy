<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правильный Квиз - Вход в систему</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .submit-button:hover {
            background: #5a67d8;
        }
        
        .submit-button:active {
            background: #4c51bf;
        }
        
        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .success-message {
            color: #38a169;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Правильный Квиз</h1>
            <p>Система управления викторинами</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="Введите ваш email"
                    required
                >
                <div id="emailError" class="error-message" style="display: none;"></div>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="Введите ваш пароль"
                    required
                >
                <div id="passwordError" class="error-message" style="display: none;"></div>
            </div>
            
            <button type="submit" class="submit-button" id="submitBtn">
                Войти
            </button>
            
            <div id="message" class="success-message" style="display: none;"></div>
        </form>
        
        <div class="footer">
            <p>© 2024 Правильный Квиз. Все права защищены.</p>
            <p>Версия 1.0.0</p>
        </div>
    </div>

    <script>
        console.log('Login form script loaded');
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            
            // Очистка ошибок
            document.getElementById('emailError').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';
            message.style.display = 'none';
            
            // Валидация
            let hasError = false;
            
            if (!email) {
                document.getElementById('emailError').textContent = 'Email обязателен';
                document.getElementById('emailError').style.display = 'block';
                hasError = true;
            }
            
            if (!password) {
                document.getElementById('passwordError').textContent = 'Пароль обязателен';
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            }
            
            if (hasError) return;
            
            // Отправка запроса
            submitBtn.textContent = 'Вход...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                // Отладочная информация
                console.log('API Response:', data);
                console.log('Data structure:', JSON.stringify(data, null, 2));
                
                if (data.success) {
                    message.textContent = 'Успешный вход! Перенаправление...';
                    message.style.display = 'block';
                    message.style.color = '#38a169';
                    
                    // Сохранение токенов с отладкой
                    console.log('Checking data structure...');
                    console.log('data.data:', data.data);
                    console.log('data.data.accessToken:', data.data?.accessToken);
                    console.log('data.data.refreshToken:', data.data?.refreshToken);
                    
                    if (data.data && data.data.accessToken && data.data.refreshToken) {
                        console.log('Saving tokens...');
                        localStorage.setItem('pravilniy_quiz_access_token', data.data.accessToken);
                        localStorage.setItem('pravilniy_quiz_refresh_token', data.data.refreshToken);
                        localStorage.setItem('pravilniy_quiz_user_data', JSON.stringify(data.data.user));
                        console.log('Tokens saved successfully');
                        
                        // Дополнительная отладка
                        console.log('Saved tokens:', {
                            accessToken: localStorage.getItem('pravilniy_quiz_access_token'),
                            refreshToken: localStorage.getItem('pravilniy_quiz_refresh_token'),
                            userData: localStorage.getItem('pravilniy_quiz_user_data')
                        });
                    } else {
                        console.error('Tokens not found in response:', data);
                        message.textContent = 'Ошибка: токены не найдены в ответе сервера';
                        message.style.color = '#e53e3e';
                    }
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    message.textContent = data.message || 'Ошибка входа';
                    message.style.display = 'block';
                    message.style.color = '#e53e3e';
                }
            } catch (error) {
                console.error('Login error:', error);
                message.textContent = 'Ошибка подключения к серверу';
                message.style.display = 'block';
                message.style.color = '#e53e3e';
            }
            
            submitBtn.textContent = 'Войти';
            submitBtn.disabled = false;
        });
        
        // Тест полей
        document.getElementById('email').addEventListener('input', function() {
            console.log('Email changed:', this.value);
        });
        
        document.getElementById('password').addEventListener('input', function() {
            console.log('Password changed');
        });
        
        console.log('Form ready');
    </script>
</body>
</html>
